name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

concurrency:
  group: pages-production
  cancel-in-progress: true

jobs:
  deploy:
    if: github.ref_name == 'main' || github.ref_name == 'master'
    runs-on: ubuntu-latest
    env:
      CF_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'medace-english-app' }}
      CF_D1_DATABASE: ${{ vars.CLOUDFLARE_D1_DATABASE || 'medace-db' }}
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify D1 migrations locally
        run: npm run db:migrate:verify

      - name: Build
        run: npm run build

      - name: Apply remote D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply "$CF_D1_DATABASE" --remote

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy dist --project-name ${{ env.CF_PAGES_PROJECT }} --branch=${{ github.ref_name }}

      - name: Inspect production Pages secrets
        id: production-secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          output="$(npx wrangler pages secret list --project-name "$CF_PAGES_PROJECT" || true)"
          printf '%s\n' "$output"
          names="$(printf '%s\n' "$output" | sed -n 's/^  - \([^:]*\):.*/\1/p' | paste -sd ',' -)"
          if [ -z "$names" ]; then
            names="(none)"
          fi
          missing=""
          for required in ADMIN_DEMO_PASSWORD GEMINI_API_KEY; do
            if ! printf '%s\n' "$names" | tr ',' '\n' | grep -qx "$required"; then
              missing="${missing}${missing:+,}$required"
            fi
          done
          if [ -z "$missing" ]; then
            missing="(none)"
          fi
          echo "names=$names" >> "$GITHUB_OUTPUT"
          echo "missing=$missing" >> "$GITHUB_OUTPUT"

      - name: Summarize production deployment
        run: |
          {
            echo "## Production Deployment"
            echo
            echo "- Branch: \`${{ github.ref_name }}\`"
            echo "- Deployment URL: ${{ steps.deploy.outputs['deployment-url'] }}"
            echo "- Alias URL: ${{ steps.deploy.outputs['pages-deployment-alias-url'] || steps.deploy.outputs['deployment-url'] }}"
            echo "- Pages Project: \`${{ env.CF_PAGES_PROJECT }}\`"
            echo "- D1 Database: \`${{ env.CF_D1_DATABASE }}\`"
            echo "- Production Secrets: \`${{ steps.production-secrets.outputs.names }}\`"
            echo "- Missing Production Secrets: \`${{ steps.production-secrets.outputs.missing }}\`"
            echo "- Schema: remote D1 migrations applied before deploy"
          } >> "$GITHUB_STEP_SUMMARY"
