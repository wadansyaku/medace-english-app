name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: pages-production
  cancel-in-progress: true

jobs:
  deploy:
    if: github.repository == 'wadansyaku/medace-english-app' && github.ref_name == 'main'
    environment:
      name: production
      url: ${{ steps.deploy.outputs['project-url'] }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      CF_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'medace-english-app' }}
      CF_D1_DATABASE: ${{ vars.CLOUDFLARE_D1_DATABASE || 'medace-db' }}
      WRITING_AI_MODE: ${{ vars.WRITING_AI_MODE || 'hybrid' }}
      VITE_ENABLE_ADMIN_DEMO: ${{ vars.VITE_ENABLE_ADMIN_DEMO || 'false' }}
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm run security:audit

      - name: Install Playwright browser
        run: node node_modules/playwright/cli.js install --with-deps chromium

      - name: Fast verification gate
        run: npm run verify:fast

      - name: Build app for local integration tests
        run: npm run build

      - name: API integration tests
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run test:api

      - name: Full smoke suite
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/run-smoke-tests.mjs --suite full

      - name: Verify GitHub and Cloudflare configuration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run cf:doctor

      - name: Sync production admin demo runtime flag
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          printf '%s\n' "$VITE_ENABLE_ADMIN_DEMO" | node node_modules/wrangler/bin/wrangler.js pages secret put ENABLE_ADMIN_DEMO --project-name "$CF_PAGES_PROJECT"

      - name: Build deploy artifact
        run: npm run build

      - name: Capture production D1 recovery bookmark
        id: d1-bookmark
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          bookmark_json="$(node node_modules/wrangler/bin/wrangler.js d1 time-travel info "$CF_D1_DATABASE" --json)"
          printf '%s\n' "$bookmark_json"
          bookmark="$(printf '%s' "$bookmark_json" | node -e "let data=''; process.stdin.on('data', (chunk) => data += chunk); process.stdin.on('end', () => { const payload = JSON.parse(data); process.stdout.write(payload.bookmark || ''); });")"
          if [ -z "$bookmark" ]; then
            echo "Failed to resolve a D1 recovery bookmark." >&2
            exit 1
          fi
          echo "bookmark=$bookmark" >> "$GITHUB_OUTPUT"

      - name: Apply remote D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node node_modules/wrangler/bin/wrangler.js d1 migrations apply "$CF_D1_DATABASE" --remote

      - name: Generate production content QA report
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/analysis/run-d1-content-qa.mjs --remote --database "$CF_D1_DATABASE" --output tmp/content-qa/production-content-qa.json --compact

      - name: Enforce production content QA gate
        run: npm run content:qa:gate -- --input tmp/content-qa/production-content-qa.json

      - name: Enforce production source ledger gate
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run content:source-ledger:d1 -- --remote --database "$CF_D1_DATABASE" --output tmp/release-gates/production-source-ledger.json --compact

      - name: Enforce production B2B activation integrity gate
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run ops:b2b-activation:d1 -- --remote --database "$CF_D1_DATABASE" --output tmp/release-gates/production-b2b-activation.json --compact

      - name: Upload production release gate evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: production-release-gate-evidence
          path: |
            tmp/content-qa/production-content-qa.json
            tmp/release-gates/production-source-ledger.json
            tmp/release-gates/production-b2b-activation.json
          if-no-files-found: ignore

      - name: Summarize production release gate evidence
        if: always()
        run: |
          {
            echo "## Production Release Gate Evidence"
            echo
            echo "- Content QA report: \`tmp/content-qa/production-content-qa.json\`"
            echo "- Source ledger report: \`tmp/release-gates/production-source-ledger.json\`"
            echo "- B2B activation report: \`tmp/release-gates/production-b2b-activation.json\`"
            echo "- Artifact: \`production-release-gate-evidence\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Update production deployment runtime metadata
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          printf '%s\n' "${GITHUB_SHA}" | node node_modules/wrangler/bin/wrangler.js pages secret put DEPLOYMENT_SHA --project-name "$CF_PAGES_PROJECT"

      - name: Deploy to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          deploy_log="$(mktemp)"
          node node_modules/wrangler/bin/wrangler.js pages deploy dist --project-name "$CF_PAGES_PROJECT" --branch="$DEPLOY_BRANCH" 2>&1 | tee "$deploy_log"
          deployment_url="$(sed -n 's/.*Take a peek over at \(https:\/\/[^ ]*\).*/\1/p' "$deploy_log" | tail -n 1)"
          if [ -z "$deployment_url" ]; then
            echo "Failed to parse deployment URL from wrangler output." >&2
            exit 1
          fi
          project_url="https://${CF_PAGES_PROJECT}.pages.dev"
          echo "deployment-url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "project-url=$project_url" >> "$GITHUB_OUTPUT"

      - name: Run deployed production smoke
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.deploy.outputs['project-url'] }}
          PLAYWRIGHT_EXPECT_DEPLOYMENT_SHA: ${{ github.sha }}
          PLAYWRIGHT_SKIP_WEBSERVER: '1'
          PLAYWRIGHT_TRACE_MODE: retain-on-failure
          PLAYWRIGHT_VIDEO_MODE: retain-on-failure
        run: node scripts/run-smoke-tests.mjs --suite sentinel --grep "public home shows the live motivation board before login|public readonly session endpoint is reachable before login|public guide keeps the business role previews visible|public role pages always emit a noindex robots tag and service admin action stays safe|service admin dedicated access link resolves to the protected admin entrypoint"

      - name: Upload production deployed smoke artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: production-deployed-smoke-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

      - name: Inspect production Pages secrets
        id: production-secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          output="$(node node_modules/wrangler/bin/wrangler.js pages secret list --project-name "$CF_PAGES_PROJECT" || true)"
          printf '%s\n' "$output"
          names="$(printf '%s\n' "$output" | sed -n 's/^  - \([^:]*\):.*/\1/p' | paste -sd ',' -)"
          if [ -z "$names" ]; then
            names="(none)"
          fi
          missing_required=""
          for required in ADMIN_DEMO_PASSWORD WRITING_AI_MODE INTERNAL_JOB_SECRET; do
            if ! printf '%s\n' "$names" | tr ',' '\n' | grep -qx "$required"; then
              missing_required="${missing_required}${missing_required:+,}$required"
            fi
          done
          if [ -z "$missing_required" ]; then
            missing_required="(none)"
          fi
          missing_optional=""
          for optional in GEMINI_API_KEY OPENAI_API_KEY; do
            if ! printf '%s\n' "$names" | tr ',' '\n' | grep -qx "$optional"; then
              missing_optional="${missing_optional}${missing_optional:+,}$optional"
            fi
          done
          if [ -z "$missing_optional" ]; then
            missing_optional="(none)"
          fi
          echo "names=$names" >> "$GITHUB_OUTPUT"
          echo "missing-required=$missing_required" >> "$GITHUB_OUTPUT"
          echo "missing-optional=$missing_optional" >> "$GITHUB_OUTPUT"

      - name: Summarize production deployment
        run: |
          {
            echo "## Production Deployment"
            echo
            echo "- Branch: \`${{ github.ref_name }}\`"
            echo "- Project URL: ${{ steps.deploy.outputs['project-url'] }}"
            echo "- Deployment URL: ${{ steps.deploy.outputs['deployment-url'] }}"
            echo "- Pages Project: \`${{ env.CF_PAGES_PROJECT }}\`"
            echo "- D1 Database: \`${{ env.CF_D1_DATABASE }}\`"
            echo "- Recovery Bookmark: \`${{ steps.d1-bookmark.outputs.bookmark }}\`"
            echo "- Writing AI Mode: \`${{ env.WRITING_AI_MODE }}\`"
            echo "- Admin Demo Enabled: \`${{ env.VITE_ENABLE_ADMIN_DEMO }}\`"
            echo "- Verification: local release gate equivalent (security:audit + verify:fast + build + API integration tests + full smoke suite + cf:doctor + content QA gate + source ledger gate + B2B activation integrity gate + build)"
            echo "- Content QA Gate: \`passed\`"
            echo "- Source Ledger Gate: \`passed\`"
            echo "- B2B Activation Integrity Gate: \`passed\`"
            echo "- Post-deploy Smoke: \`passed\`"
            echo "- Production Secrets: \`${{ steps.production-secrets.outputs.names }}\`"
            echo "- Missing Required Production Secrets: \`${{ steps.production-secrets.outputs['missing-required'] }}\`"
            echo "- Missing Optional Production Secrets: \`${{ steps.production-secrets.outputs['missing-optional'] }}\`"
            echo "- Schema: remote D1 migrations applied before deploy"
          } >> "$GITHUB_STEP_SUMMARY"
