name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

concurrency:
  group: pages-production
  cancel-in-progress: true

jobs:
  deploy:
    if: github.repository == 'wadansyaku/medace-english-app' && (github.ref_name == 'main' || github.ref_name == 'master')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      CF_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'medace-english-app' }}
      CF_D1_DATABASE: ${{ vars.CLOUDFLARE_D1_DATABASE || 'medace-db' }}
      WRITING_AI_MODE: ${{ vars.WRITING_AI_MODE || 'hybrid' }}
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Verify D1 migrations locally
        run: npm run db:migrate:verify

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: API integration tests
        run: npm run test:api

      - name: Browser smoke tests
        run: npm run test:smoke

      - name: Verify GitHub and Cloudflare configuration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run cf:doctor

      - name: Build
        run: npm run build

      - name: Apply remote D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply "$CF_D1_DATABASE" --remote

      - name: Deploy to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          deploy_log="$(mktemp)"
          npx wrangler pages deploy dist --project-name "$CF_PAGES_PROJECT" --branch="$DEPLOY_BRANCH" 2>&1 | tee "$deploy_log"
          deployment_url="$(sed -n 's/.*Take a peek over at \(https:\/\/[^ ]*\).*/\1/p' "$deploy_log" | tail -n 1)"
          if [ -z "$deployment_url" ]; then
            echo "Failed to parse deployment URL from wrangler output." >&2
            exit 1
          fi
          project_url="https://${CF_PAGES_PROJECT}.pages.dev"
          echo "deployment-url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "project-url=$project_url" >> "$GITHUB_OUTPUT"

      - name: Inspect production Pages secrets
        id: production-secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          output="$(npx wrangler pages secret list --project-name "$CF_PAGES_PROJECT" || true)"
          printf '%s\n' "$output"
          names="$(printf '%s\n' "$output" | sed -n 's/^  - \([^:]*\):.*/\1/p' | paste -sd ',' -)"
          if [ -z "$names" ]; then
            names="(none)"
          fi
          missing_required=""
          for required in ADMIN_DEMO_PASSWORD WRITING_AI_MODE; do
            if ! printf '%s\n' "$names" | tr ',' '\n' | grep -qx "$required"; then
              missing_required="${missing_required}${missing_required:+,}$required"
            fi
          done
          if [ -z "$missing_required" ]; then
            missing_required="(none)"
          fi
          missing_optional=""
          for optional in GEMINI_API_KEY OPENAI_API_KEY; do
            if ! printf '%s\n' "$names" | tr ',' '\n' | grep -qx "$optional"; then
              missing_optional="${missing_optional}${missing_optional:+,}$optional"
            fi
          done
          if [ -z "$missing_optional" ]; then
            missing_optional="(none)"
          fi
          echo "names=$names" >> "$GITHUB_OUTPUT"
          echo "missing-required=$missing_required" >> "$GITHUB_OUTPUT"
          echo "missing-optional=$missing_optional" >> "$GITHUB_OUTPUT"

      - name: Summarize production deployment
        run: |
          {
            echo "## Production Deployment"
            echo
            echo "- Branch: \`${{ github.ref_name }}\`"
            echo "- Project URL: ${{ steps.deploy.outputs['project-url'] }}"
            echo "- Deployment URL: ${{ steps.deploy.outputs['deployment-url'] }}"
            echo "- Pages Project: \`${{ env.CF_PAGES_PROJECT }}\`"
            echo "- D1 Database: \`${{ env.CF_D1_DATABASE }}\`"
            echo "- Writing AI Mode: \`${{ env.WRITING_AI_MODE }}\`"
            echo "- Verification: typecheck + unit tests + API integration tests + browser smoke + cf:doctor"
            echo "- Smoke: \`passed\`"
            echo "- Production Secrets: \`${{ steps.production-secrets.outputs.names }}\`"
            echo "- Missing Required Production Secrets: \`${{ steps.production-secrets.outputs['missing-required'] }}\`"
            echo "- Missing Optional Production Secrets: \`${{ steps.production-secrets.outputs['missing-optional'] }}\`"
            echo "- Schema: remote D1 migrations applied before deploy"
          } >> "$GITHUB_STEP_SUMMARY"
