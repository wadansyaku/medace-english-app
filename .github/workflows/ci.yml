name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fast verification gate
        run: npm run verify:fast

      - name: Build
        run: npm run build

      - name: Install Playwright browser for sentinel smoke
        if: github.event_name == 'push'
        run: node node_modules/playwright/cli.js install --with-deps chromium

      - name: Run smoke sentinel
        if: github.event_name == 'push'
        env:
          SMOKE_SKIP_BUILD: '1'
        run: node scripts/run-smoke-tests.mjs --suite sentinel

      - name: API integration tests
        run: npm run test:api

      - name: Verify GitHub and Cloudflare configuration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Skipping cf:doctor because Cloudflare credentials are unavailable in this workflow context."
            exit 0
          fi
          npm run cf:doctor
