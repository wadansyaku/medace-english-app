name: Analytics Snapshot Agent

on:
  workflow_dispatch:
  schedule:
    - cron: '40 18 * * *'

jobs:
  snapshot:
    if: github.repository == 'wadansyaku/medace-english-app'
    runs-on: ubuntu-latest
    env:
      APP_BASE_URL: https://medace-english-app.pages.dev
      INTERNAL_JOB_SECRET: ${{ secrets.INTERNAL_JOB_SECRET }}
    steps:
      - name: Call internal analytics snapshot agent
        run: |
          if [ -z "$INTERNAL_JOB_SECRET" ]; then
            echo "INTERNAL_JOB_SECRET is not configured." >&2
            exit 1
          fi

          response="$(curl -fsS -X POST "$APP_BASE_URL/api/internal/analytics-snapshots/run" \
            -H "Content-Type: application/json" \
            -H "X-Internal-Job-Secret: $INTERNAL_JOB_SECRET" \
            --data '{}')"

          echo "$response"
          {
            echo "## Analytics Snapshot Agent"
            echo
            echo "- Base URL: \`$APP_BASE_URL\`"
            echo "- Response:"
            echo '```json'
            echo "$response"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
