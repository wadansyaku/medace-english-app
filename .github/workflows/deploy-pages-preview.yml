name: Deploy Pages Preview

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - master
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: pages-preview-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.repository == 'wadansyaku/medace-english-app' && (github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      CF_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'medace-english-app' }}
      CF_D1_DATABASE: ${{ vars.CLOUDFLARE_D1_DATABASE || 'medace-db' }}
      WRITING_AI_MODE: ${{ vars.WRITING_AI_MODE || 'hybrid' }}
      PREVIEW_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
    permissions:
      contents: read
      deployments: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Verify D1 migrations locally
        run: npm run db:migrate:verify

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: API integration tests
        run: npm run test:api

      - name: Browser smoke tests
        run: npm run test:smoke

      - name: Verify GitHub and Cloudflare configuration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run cf:doctor

      - name: Build
        run: npm run build

      - name: Deploy preview to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          deploy_log="$(mktemp)"
          npx wrangler pages deploy dist --project-name "$CF_PAGES_PROJECT" --branch="$PREVIEW_BRANCH" 2>&1 | tee "$deploy_log"
          deployment_url="$(sed -n 's/.*Take a peek over at \(https:\/\/[^ ]*\).*/\1/p' "$deploy_log" | tail -n 1)"
          if [ -z "$deployment_url" ]; then
            echo "Failed to parse deployment URL from wrangler output." >&2
            exit 1
          fi
          branch_alias="$(printf '%s' "$PREVIEW_BRANCH" | tr '[:upper:]' '[:lower:]' | sed -E 's#[^a-z0-9-]+#-#g; s#-+#-#g; s#^-##; s#-$##')"
          alias_url="$deployment_url"
          if [ -n "$branch_alias" ]; then
            alias_url="https://${branch_alias}.${CF_PAGES_PROJECT}.pages.dev"
          fi
          echo "deployment-url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "branch-alias-url=$alias_url" >> "$GITHUB_OUTPUT"

      - name: Inspect preview Pages secrets
        id: preview-secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          output="$(npx wrangler pages secret list --project-name "$CF_PAGES_PROJECT" --env preview || true)"
          printf '%s\n' "$output"
          names="$(printf '%s\n' "$output" | sed -n 's/^  - \([^:]*\):.*/\1/p' | paste -sd ',' -)"
          if [ -z "$names" ]; then
            names="(none)"
          fi
          missing_required=""
          for required in ADMIN_DEMO_PASSWORD WRITING_AI_MODE; do
            if ! printf '%s\n' "$names" | tr ',' '\n' | grep -qx "$required"; then
              missing_required="${missing_required}${missing_required:+,}$required"
            fi
          done
          if [ -z "$missing_required" ]; then
            missing_required="(none)"
          fi
          missing_optional=""
          for optional in GEMINI_API_KEY OPENAI_API_KEY; do
            if ! printf '%s\n' "$names" | tr ',' '\n' | grep -qx "$optional"; then
              missing_optional="${missing_optional}${missing_optional:+,}$optional"
            fi
          done
          if [ -z "$missing_optional" ]; then
            missing_optional="(none)"
          fi
          echo "names=$names" >> "$GITHUB_OUTPUT"
          echo "missing-required=$missing_required" >> "$GITHUB_OUTPUT"
          echo "missing-optional=$missing_optional" >> "$GITHUB_OUTPUT"

      - name: Summarize preview deployment
        run: |
          {
            echo "## Preview Deployment"
            echo
            echo "- Branch: \`${{ env.PREVIEW_BRANCH }}\`"
            echo "- Branch Alias URL: ${{ steps.deploy.outputs['branch-alias-url'] }}"
            echo "- Deployment URL: ${{ steps.deploy.outputs['deployment-url'] }}"
            echo "- Pages Project: \`${{ env.CF_PAGES_PROJECT }}\`"
            echo "- D1 Database: \`${{ env.CF_D1_DATABASE }}\`"
            echo "- Writing AI Mode: \`${{ env.WRITING_AI_MODE }}\`"
            echo "- Verification: typecheck + unit tests + API integration tests + browser smoke + cf:doctor"
            echo "- Smoke: \`passed\`"
            echo "- Preview Secrets: \`${{ steps.preview-secrets.outputs.names }}\`"
            echo "- Missing Required Preview Secrets: \`${{ steps.preview-secrets.outputs['missing-required'] }}\`"
            echo "- Missing Optional Preview Secrets: \`${{ steps.preview-secrets.outputs['missing-optional'] }}\`"
            echo "- Note: preview deploys do not run remote D1 migrations."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Update PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs['deployment-url'] }}
          ALIAS_URL: ${{ steps.deploy.outputs['branch-alias-url'] }}
          PREVIEW_SECRETS: ${{ steps.preview-secrets.outputs.names }}
          MISSING_REQUIRED_PREVIEW_SECRETS: ${{ steps.preview-secrets.outputs['missing-required'] }}
          MISSING_OPTIONAL_PREVIEW_SECRETS: ${{ steps.preview-secrets.outputs['missing-optional'] }}
          CF_PAGES_PROJECT: ${{ env.CF_PAGES_PROJECT }}
          CF_D1_DATABASE: ${{ env.CF_D1_DATABASE }}
          PREVIEW_BRANCH: ${{ env.PREVIEW_BRANCH }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const marker = '<!-- codex-preview-comment -->';
            const body = [
              marker,
              '## Cloudflare Preview',
              '',
              `- Branch: \`${process.env.PREVIEW_BRANCH}\``,
              `- Branch Alias URL: ${process.env.ALIAS_URL || process.env.DEPLOYMENT_URL}`,
              `- Deployment URL: ${process.env.DEPLOYMENT_URL}`,
              `- Pages Project: \`${process.env.CF_PAGES_PROJECT}\``,
              `- D1 Database: \`${process.env.CF_D1_DATABASE}\``,
              `- Writing AI Mode: \`${process.env.WRITING_AI_MODE}\``,
              '- Smoke: `passed`',
              `- Preview Secrets: \`${process.env.PREVIEW_SECRETS || '(none)'}\``,
              `- Missing Required Preview Secrets: \`${process.env.MISSING_REQUIRED_PREVIEW_SECRETS || '(none)'}\``,
              `- Missing Optional Preview Secrets: \`${process.env.MISSING_OPTIONAL_PREVIEW_SECRETS || '(none)'}\``,
              '- Verification: typecheck + unit tests + API integration tests + browser smoke + cf:doctor',
              '- Note: preview deploys do not run remote D1 migrations.',
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pr.number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body,
              });
            }
