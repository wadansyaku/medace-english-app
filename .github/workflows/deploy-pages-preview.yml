name: Deploy Pages Preview

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main
      - master

concurrency:
  group: pages-preview-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.ref_name != 'main' && github.ref_name != 'master'
    runs-on: ubuntu-latest
    env:
      CF_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'medace-english-app' }}
      CF_D1_DATABASE: ${{ vars.CLOUDFLARE_D1_DATABASE || 'medace-db' }}
    permissions:
      contents: read
      deployments: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify D1 migrations locally
        run: npm run db:migrate:verify

      - name: Build
        run: npm run build

      - name: Deploy preview to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy dist --project-name ${{ env.CF_PAGES_PROJECT }} --branch=${{ github.ref_name }}

      - name: Inspect preview Pages secrets
        id: preview-secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          output="$(npx wrangler pages secret list --project-name "$CF_PAGES_PROJECT" --env preview || true)"
          printf '%s\n' "$output"
          names="$(printf '%s\n' "$output" | sed -n 's/^  - \([^:]*\):.*/\1/p' | paste -sd ',' -)"
          if [ -z "$names" ]; then
            names="(none)"
          fi
          missing=""
          for required in ADMIN_DEMO_PASSWORD GEMINI_API_KEY; do
            if ! printf '%s\n' "$names" | tr ',' '\n' | grep -qx "$required"; then
              missing="${missing}${missing:+,}$required"
            fi
          done
          if [ -z "$missing" ]; then
            missing="(none)"
          fi
          echo "names=$names" >> "$GITHUB_OUTPUT"
          echo "missing=$missing" >> "$GITHUB_OUTPUT"

      - name: Summarize preview deployment
        run: |
          {
            echo "## Preview Deployment"
            echo
            echo "- Branch: \`${{ github.ref_name }}\`"
            echo "- Deployment URL: ${{ steps.deploy.outputs['deployment-url'] }}"
            echo "- Alias URL: ${{ steps.deploy.outputs['pages-deployment-alias-url'] || steps.deploy.outputs['deployment-url'] }}"
            echo "- Pages Project: \`${{ env.CF_PAGES_PROJECT }}\`"
            echo "- D1 Database: \`${{ env.CF_D1_DATABASE }}\`"
            echo "- Preview Secrets: \`${{ steps.preview-secrets.outputs.names }}\`"
            echo "- Missing Preview Secrets: \`${{ steps.preview-secrets.outputs.missing }}\`"
            echo "- Note: preview deploys do not run remote D1 migrations."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Update PR with preview URL
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs['deployment-url'] }}
          ALIAS_URL: ${{ steps.deploy.outputs['pages-deployment-alias-url'] || steps.deploy.outputs['deployment-url'] }}
          PREVIEW_SECRETS: ${{ steps.preview-secrets.outputs.names }}
          MISSING_PREVIEW_SECRETS: ${{ steps.preview-secrets.outputs.missing }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = context.ref.replace('refs/heads/', '');
            const { data: prs } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${head}`,
            });
            if (prs.length === 0) {
              core.info(`No open PR found for branch ${head}.`);
              return;
            }

            const pr = prs[0];
            const marker = '<!-- codex-preview-comment -->';
            const body = [
              marker,
              '## Cloudflare Preview',
              '',
              `- Branch: \`${head}\``,
              `- Deployment URL: ${process.env.DEPLOYMENT_URL}`,
              `- Alias URL: ${process.env.ALIAS_URL || process.env.DEPLOYMENT_URL}`,
              `- Pages Project: \`${process.env.CF_PAGES_PROJECT}\``,
              `- D1 Database: \`${process.env.CF_D1_DATABASE}\``,
              `- Preview Secrets: \`${process.env.PREVIEW_SECRETS || '(none)'}\``,
              `- Missing Preview Secrets: \`${process.env.MISSING_PREVIEW_SECRETS || '(none)'}\``,
              '- Note: preview deploys do not run remote D1 migrations.',
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pr.number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body,
              });
            }
