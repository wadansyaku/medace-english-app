name: Deploy Pages Preview

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main
      - master

concurrency:
  group: pages-preview-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify D1 migrations locally
        run: npm run db:migrate:verify

      - name: Build
        run: npm run build

      - name: Deploy preview to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy dist --project-name medace-english-app --branch=${{ github.ref_name }}

      - name: Summarize preview deployment
        run: |
          {
            echo "## Preview Deployment"
            echo
            echo "- Branch: \`${{ github.ref_name }}\`"
            echo "- Deployment URL: ${{ steps.deploy.outputs['deployment-url'] }}"
            echo "- Alias URL: ${{ steps.deploy.outputs['pages-deployment-alias-url'] || steps.deploy.outputs['deployment-url'] }}"
            echo "- Note: preview deploys do not run remote D1 migrations."
          } >> "$GITHUB_STEP_SUMMARY"
